<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>free X-Ray</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4.5rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .buttons:first-of-type {
            margin-top: 6rem;
        }

        .btn-wrap {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-primary:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .mirror-link {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: underline;
            font-family: inherit;
        }

        .mirror-link:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .btn-copied-wrap {
            flex-basis: 100%;
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .btn-copied {
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0.5rem;
            font-family: inherit;
            text-align: center;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }

        .btn-copied.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .buttons-divider {
            width: 100%;
            max-width: 320px;
            height: 1px;
            margin: 1.5rem auto;
            background: rgba(255, 255, 255, 0.25);
        }

        @media (max-width: 640px) {
            .buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-wrap {
                align-items: stretch;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>free X-Ray</h1>
        <div class="buttons">
            <span class="btn-wrap">
                <a href="https://github.com/WhitePrime/xraycheck/raw/main/configs/available(top100).txt" class="btn btn-primary" data-copy-link>
                    available (top100)
                </a>
                <a href="https://translate.yandex.ru/translate?url=https://github.com/WhitePrime/xraycheck/raw/main/configs/available(top100).txt&lang=en-en" class="mirror-link" data-copy-link title="Зеркало">Зеркало</a>
            </span>
            <span class="btn-wrap">
                <a href="https://github.com/WhitePrime/xraycheck/raw/main/configs/white-list_available(top100).txt" class="btn btn-primary" data-copy-link>
                    white list (top100)
                </a>
                <a href="https://translate.yandex.ru/translate?url=https://github.com/WhitePrime/xraycheck/raw/main/configs/white-list_available(top100).txt&lang=en-en" class="mirror-link" data-copy-link title="Зеркало">Зеркало</a>
            </span>
        </div>
        <hr class="buttons-divider" aria-hidden="true">
        <div class="buttons">
            <span class="btn-wrap">
                <a href="https://github.com/WhitePrime/xraycheck/raw/main/configs/available.txt" class="btn" data-copy-link>
                    available
                </a>
                <a href="https://translate.yandex.ru/translate?url=https://github.com/WhitePrime/xraycheck/raw/main/configs/available.txt&lang=en-en" class="mirror-link" data-copy-link title="Зеркало">Зеркало</a>
            </span>
            <span class="btn-wrap">
                <a href="https://github.com/WhitePrime/xraycheck/raw/main/configs/white-list_available.txt" class="btn" data-copy-link>
                    white list
                </a>
                <a href="https://translate.yandex.ru/translate?url=https://github.com/WhitePrime/xraycheck/raw/main/configs/white-list_available.txt&lang=en-en" class="mirror-link" data-copy-link title="Зеркало">Зеркало</a>
            </span>
            <span class="btn-copied-wrap">
                <span class="btn-copied" id="copy-notice" aria-live="polite">Ссылка скопирована</span>
            </span>
        </div>
    </div>
    <script>
        var notice = document.getElementById('copy-notice');
        document.querySelectorAll('[data-copy-link]').forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                var url = this.getAttribute('href');

                function showNotice() {
                    if (notice) {
                        notice.classList.add('is-visible');
                        setTimeout(function() {
                            notice.classList.remove('is-visible');
                        }, 2000);
                    }
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(showNotice).catch(function() {
                        fallbackCopy(url, showNotice);
                    });
                } else {
                    fallbackCopy(url, showNotice);
                }
            });
        });

        function fallbackCopy(text, onDone) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.setAttribute('readonly', '');
            ta.style.position = 'absolute';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                if (onDone) onDone();
            } catch (err) {}
            document.body.removeChild(ta);
        }
    </script>
</body>
</html>
