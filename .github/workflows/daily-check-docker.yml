# Проверка конфигов в Docker (CIDR whitelist) и публикация white-list_available.txt
# Запускается через 1 час после успешного завершения workflow "Daily VLESS check".
# Берёт список ключей из available.txt (не из links.txt).

name: Daily VLESS check (Docker / whitelist)

on:
  workflow_run:
    workflows: ["Daily VLESS check"]
    types: [completed]
    branches: [main]

env:
  MODE: merge
  LINKS_FILE: links.txt
  OUTPUT_FILE: white-list_available.txt
  OUTPUT_ADD_DATE: 'false'
  MAX_WORKERS: 200
  EXPORT_FORMAT: txt
  ENABLE_CACHE: 'false'

jobs:
  docker-check-and-publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Wait 1 hour after daily check
        run: sleep 3600

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure .env exists for docker compose
        run: touch .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build

      - name: Run checker in Docker (input = available.txt from main)
        env:
          AVAILABLE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.repository.default_branch || 'main' }}/available.txt
        run: |
          docker compose run --rm \
            -e OUTPUT_FILE="$OUTPUT_FILE" \
            -e MODE="$MODE" \
            -e OUTPUT_ADD_DATE="$OUTPUT_ADD_DATE" \
            -e MAX_WORKERS="$MAX_WORKERS" \
            -e EXPORT_FORMAT="$EXPORT_FORMAT" \
            -e ENABLE_CACHE="$ENABLE_CACHE" \
            vless-checker "$AVAILABLE_URL"

      - name: Commit and push white-list_available.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain white-list_available.txt)" ]; then
            git add white-list_available.txt
            git commit -m "chore: update white-list_available.txt [Docker, automated]"
            git push
          else
            echo "white-list_available.txt unchanged, skip push"
          fi
