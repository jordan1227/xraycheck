# Проверка конфигов в Docker (CIDR whitelist) и публикация white-list_available.txt
# Запускается сразу после успешного завершения workflow "Daily VLESS check".
# Берёт список ключей из available.txt (не из links.txt).

name: Daily VLESS check (Docker / whitelist)

on:
  workflow_run:
    workflows: ["Daily VLESS check"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  MODE: single
  LINKS_FILE: links.txt
  OUTPUT_FILE: white-list_available.txt
  OUTPUT_ADD_DATE: 'false'
  MAX_WORKERS: 200
  EXPORT_FORMAT: txt
  ENABLE_CACHE: 'false'

jobs:
  docker-check-and-publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Ensure .env exists for docker compose
        run: touch .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build

      - name: Run checker in Docker (input = available.txt from main)
        env:
          AVAILABLE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/available.txt
        run: |
          touch .before-docker-run
          docker compose run --rm \
            -e OUTPUT_FILE="$OUTPUT_FILE" \
            -e MODE="$MODE" \
            -e OUTPUT_ADD_DATE="$OUTPUT_ADD_DATE" \
            -e MAX_WORKERS="$MAX_WORKERS" \
            -e EXPORT_FORMAT="$EXPORT_FORMAT" \
            -e ENABLE_CACHE="$ENABLE_CACHE" \
            vless-checker "$AVAILABLE_URL"

      - name: Verify white-list_available.txt and create top100 if missing
        run: |
          test -f "white-list_available.txt" || (echo "::error::white-list_available.txt not found" && exit 1)
          if [ .before-docker-run -nt "white-list_available.txt" ] || [ ! -f .before-docker-run ]; then
            echo "::error::white-list_available.txt was not updated by Docker (checker produced no output or wrote elsewhere)"
            exit 1
          fi
          if [ ! -f "white-list_available(top100).txt" ]; then
            echo "white-list_available(top100).txt not created by checker, creating from first 100 lines of main file"
            head -n 100 "white-list_available.txt" > "white-list_available(top100).txt"
          fi
          rm -f .before-docker-run
          echo "Output files:"
          ls -la white-list_available.txt "white-list_available(top100).txt"

      - name: Commit and push white-list_available.txt and white-list_available(top100).txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=
          if [ -n "$(git status --porcelain white-list_available.txt)" ]; then
            git add white-list_available.txt
            CHANGED=1
          fi
          if [ -f "white-list_available(top100).txt" ] && [ -n "$(git status --porcelain 'white-list_available(top100).txt')" ]; then
            git add "white-list_available(top100).txt"
            CHANGED=1
          fi
          if [ -n "$CHANGED" ]; then
            git commit -m "chore: update white-list_available.txt and top100 [Docker, automated]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          else
            echo "white-list_available.txt and top100 unchanged, skip push"
          fi
