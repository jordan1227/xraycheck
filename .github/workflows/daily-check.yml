# Ежедневная проверка VLESS-ключей и публикация available.txt

name: Daily VLESS check

on:
  schedule:
    # MSK (UTC+3). Сдвиг на 10 мин от начала часа уменьшает задержки GitHub
    - cron: '10 2 * * *'   # 7:10 MSK
    - cron: '10 9 * * *'  # 14:10 MSK
    - cron: '10 14 * * *'  # 19:10 MSK
  workflow_dispatch:
    # Ручной запуск из вкладки Actions

concurrency:
  group: daily-vless-check
  cancel-in-progress: true

env:
  MODE: merge
  LINKS_FILE: links.txt
  OUTPUT_FILE: available.txt
  OUTPUT_DIR: configs
  OUTPUT_ADD_DATE: 'false'
  MAX_WORKERS: 200
  EXPORT_FORMAT: txt
  ENABLE_CACHE: 'false'
  TEST_URLS: http://www.google.com/generate_204,http://www.cloudflare.com/cdn-cgi/trace
  TEST_URLS_HTTPS: https://www.gstatic.com/generate_204
  REQUIRE_HTTPS: 'true'
  STRONG_STYLE_TEST: 'true'
  STRONG_STYLE_TIMEOUT: 12
  STRONG_MAX_RESPONSE_TIME: 3
  STRONG_DOUBLE_CHECK: 'true'
  STRONG_ATTEMPTS: 3
  REQUESTS_PER_URL: 2
  MIN_SUCCESSFUL_REQUESTS: 2
  MIN_SUCCESSFUL_URLS: 2
  REQUEST_DELAY: 0.1
  CONNECT_TIMEOUT: 6
  CONNECT_TIMEOUT_SLOW: 15
  USE_ADAPTIVE_TIMEOUT: 'false'
  MAX_RETRIES: 1
  MAX_RESPONSE_TIME: 6
  MIN_RESPONSE_SIZE: 0
  MAX_LATENCY_MS: 2000
  VERIFY_HTTPS_SSL: 'false'
  STABILITY_CHECKS: 2
  STABILITY_CHECK_DELAY: 2.0
  STRICT_MODE: 'true'
  STRICT_MODE_REQUIRE_ALL: 'true'
  TEST_POST_REQUESTS: 'false'

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create links.txt from secret
        run: |
          if [ -z "$LINKS_FILE_CONTENT" ]; then
            echo "::error::Secret LINKS_FILE_CONTENT is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$LINKS_FILE_CONTENT" > links.txt
        env:
          LINKS_FILE_CONTENT: ${{ secrets.LINKS_FILE_CONTENT }}

      - name: Run vless_checker.py
        run: python vless_checker.py

      - name: Commit and push configs/available.txt and configs/available(top100).txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p configs
          if [ -f "configs/available.txt" ]; then
            git add configs/available.txt
          fi
          if [ -f "configs/available(top100).txt" ]; then
            git add "configs/available(top100).txt"
          fi
          if ! git diff --cached --quiet; then
            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
            echo "$OLD" | jq -c --arg t "$NOW" '. + {"configs/available(top100).txt": $t, "configs/available.txt": $t}' > configs/last-updated.json
            git add configs/last-updated.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: update configs/available.txt and top100 [automated]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          else
            echo "configs/available.txt and top100 unchanged, skip push"
          fi
