# Ежедневная проверка VLESS-ключей и публикация configs/available (без расширения)

name: Daily VLESS check

on:
  schedule:
    # MSK. Non-zero minute avoids GitHub's top-of-hour schedule queue.
    - cron: '17 7 * * *'
      timezone: Europe/Moscow
    - cron: '17 14 * * *'
      timezone: Europe/Moscow
    - cron: '17 19 * * *'
      timezone: Europe/Moscow
  workflow_dispatch:
    # Ручной запуск из вкладки Actions

concurrency:
  group: daily-vless-check
  cancel-in-progress: true

env:
  MODE: merge
  LINKS_FILE: links.txt
  OUTPUT_FILE: available
  OUTPUT_DIR: configs
  OUTPUT_ADD_DATE: 'false'
  MAX_WORKERS: 200
  EXPORT_FORMAT: txt
  ENABLE_CACHE: 'false'
  TEST_URLS: http://www.google.com/generate_204,http://www.cloudflare.com/cdn-cgi/trace
  TEST_URLS_HTTPS: https://www.gstatic.com/generate_204
  REQUIRE_HTTPS: 'true'
  STRONG_STYLE_TEST: 'true'
  STRONG_STYLE_TIMEOUT: 12
  STRONG_MAX_RESPONSE_TIME: 3
  STRONG_DOUBLE_CHECK: 'true'
  STRONG_ATTEMPTS: 3
  REQUESTS_PER_URL: 2
  MIN_SUCCESSFUL_REQUESTS: 2
  MIN_SUCCESSFUL_URLS: 2
  REQUEST_DELAY: 0.1
  CONNECT_TIMEOUT: 6
  CONNECT_TIMEOUT_SLOW: 15
  USE_ADAPTIVE_TIMEOUT: 'false'
  MAX_RETRIES: 1
  MAX_RESPONSE_TIME: 6
  MIN_RESPONSE_SIZE: 0
  MAX_LATENCY_MS: 2000
  VERIFY_HTTPS_SSL: 'false'
  STABILITY_CHECKS: 2
  STABILITY_CHECK_DELAY: 2.0
  STRICT_MODE: 'true'
  STRICT_MODE_REQUIRE_ALL: 'true'
  TEST_POST_REQUESTS: 'false'
  MIN_PUBLISHED_CONFIGS: '10'

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create links.txt from secret
        run: |
          if [ -z "$LINKS_FILE_CONTENT" ]; then
            echo "::error::Secret LINKS_FILE_CONTENT is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$LINKS_FILE_CONTENT" > links.txt
        env:
          LINKS_FILE_CONTENT: ${{ secrets.LINKS_FILE_CONTENT }}

      - name: Run vless_checker.py
        run: |
          touch .before-vless-run
          python vless_checker.py

      - name: Validate configs/available
        run: |
          MIN_COUNT="${MIN_PUBLISHED_CONFIGS:-10}"
          FILE="configs/available"
          TOP100_FILE="configs/available(top100)"
          if [ -f .before-vless-run ] && [ .before-vless-run -nt "$FILE" ]; then
            echo "::error::$FILE was not updated by checker; keeping previous published files"
            git restore --source=HEAD -- "$FILE" "$TOP100_FILE" 2>/dev/null || true
            exit 1
          fi
          if [ ! -s "$FILE" ]; then
            echo "::error::$FILE not found or empty; keeping previous published files"
            git restore --source=HEAD -- "$FILE" "$TOP100_FILE" 2>/dev/null || true
            exit 1
          fi
          COUNT=$(awk 'NF { count++ } END { print count + 0 }' "$FILE")
          if [ "$COUNT" -lt "$MIN_COUNT" ]; then
            echo "::error::$FILE has only $COUNT configs; minimum is $MIN_COUNT. Keeping previous published files."
            git restore --source=HEAD -- "$FILE" "$TOP100_FILE" 2>/dev/null || true
            exit 1
          fi
          if [ ! -s "$TOP100_FILE" ] || [ "$FILE" -nt "$TOP100_FILE" ]; then
            head -n 100 "$FILE" > "$TOP100_FILE"
          fi
          rm -f .before-vless-run
          echo "$FILE passed validation with $COUNT configs"

      - name: Commit and push configs/available and configs/available(top100)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p configs
          if [ -f "configs/available" ]; then git add configs/available; fi
          if [ -f "configs/available(top100)" ]; then git add "configs/available(top100)"; fi
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          C=$(awk 'NF { count++ } END { print count + 0 }' "configs/available" 2>/dev/null || echo "0")
          C100=$(awk 'NF { count++ } END { print count + 0 }' "configs/available(top100)" 2>/dev/null || echo "0")
          OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
          echo "$OLD" | jq -c --arg t "$NOW" --argjson c "$C" --argjson c100 "$C100" '.["configs/available"] = {updated: $t, count: $c} | .["configs/available(top100)"] = {updated: $t, count: $c100}' > configs/last-updated.json
          git add configs/last-updated.json
          if ! git diff --cached --quiet; then
            git commit -m "update configs/available and top100 [automated]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          else
            echo "configs/available and top100 unchanged, skip push"
          fi

  docker-check-and-publish:
    needs: check-and-publish
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      MODE: single
      OUTPUT_FILE: white-list_available

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Ensure .env exists for docker compose
        run: touch .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build

      - name: Run checker in Docker (input = configs/available from main)
        env:
          AVAILABLE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/configs/available
        run: |
          touch .before-docker-run
          docker compose run --rm \
            -e OUTPUT_FILE="$OUTPUT_FILE" \
            -e OUTPUT_DIR="$OUTPUT_DIR" \
            -e MODE="$MODE" \
            -e OUTPUT_ADD_DATE="$OUTPUT_ADD_DATE" \
            -e MAX_WORKERS="$MAX_WORKERS" \
            -e EXPORT_FORMAT="$EXPORT_FORMAT" \
            -e ENABLE_CACHE="$ENABLE_CACHE" \
            -e TEST_URLS="$TEST_URLS" \
            -e TEST_URLS_HTTPS="$TEST_URLS_HTTPS" \
            -e REQUIRE_HTTPS="$REQUIRE_HTTPS" \
            -e STRONG_STYLE_TEST="$STRONG_STYLE_TEST" \
            -e STRONG_STYLE_TIMEOUT="$STRONG_STYLE_TIMEOUT" \
            -e STRONG_MAX_RESPONSE_TIME="$STRONG_MAX_RESPONSE_TIME" \
            -e STRONG_DOUBLE_CHECK="$STRONG_DOUBLE_CHECK" \
            -e STRONG_ATTEMPTS="$STRONG_ATTEMPTS" \
            -e REQUESTS_PER_URL="$REQUESTS_PER_URL" \
            -e MIN_SUCCESSFUL_REQUESTS="$MIN_SUCCESSFUL_REQUESTS" \
            -e MIN_SUCCESSFUL_URLS="$MIN_SUCCESSFUL_URLS" \
            -e REQUEST_DELAY="$REQUEST_DELAY" \
            -e CONNECT_TIMEOUT="$CONNECT_TIMEOUT" \
            -e CONNECT_TIMEOUT_SLOW="$CONNECT_TIMEOUT_SLOW" \
            -e USE_ADAPTIVE_TIMEOUT="$USE_ADAPTIVE_TIMEOUT" \
            -e MAX_RETRIES="$MAX_RETRIES" \
            -e MAX_RESPONSE_TIME="$MAX_RESPONSE_TIME" \
            -e MIN_RESPONSE_SIZE="$MIN_RESPONSE_SIZE" \
            -e MAX_LATENCY_MS="$MAX_LATENCY_MS" \
            -e VERIFY_HTTPS_SSL="$VERIFY_HTTPS_SSL" \
            -e STABILITY_CHECKS="$STABILITY_CHECKS" \
            -e STABILITY_CHECK_DELAY="$STABILITY_CHECK_DELAY" \
            -e STRICT_MODE="$STRICT_MODE" \
            -e STRICT_MODE_REQUIRE_ALL="$STRICT_MODE_REQUIRE_ALL" \
            -e TEST_POST_REQUESTS="$TEST_POST_REQUESTS" \
            vless-checker "$AVAILABLE_URL"

      - name: Verify configs/white-list_available and create top100 if missing
        run: |
          test -f "configs/white-list_available" || (echo "::error::configs/white-list_available not found" && exit 1)
          if [ -f .before-docker-run ] && [ .before-docker-run -nt "configs/white-list_available" ]; then
            echo "::error::configs/white-list_available was not updated by Docker; keeping previous published files"
            git restore --source=HEAD -- "configs/white-list_available" "configs/white-list_available(top100)" 2>/dev/null || true
            exit 1
          fi
          MIN_COUNT="${MIN_PUBLISHED_CONFIGS:-10}"
          COUNT=$(awk 'NF { count++ } END { print count + 0 }' "configs/white-list_available")
          if [ "$COUNT" -lt "$MIN_COUNT" ]; then
            echo "::error::configs/white-list_available has only $COUNT configs; minimum is $MIN_COUNT. Keeping previous published files."
            git restore --source=HEAD -- "configs/white-list_available" "configs/white-list_available(top100)" 2>/dev/null || true
            exit 1
          fi
          if [ ! -s "configs/white-list_available(top100)" ] || [ "configs/white-list_available" -nt "configs/white-list_available(top100)" ]; then
            echo "configs/white-list_available(top100) not created by checker, creating from first 100 lines of main file"
            mkdir -p configs
            head -n 100 "configs/white-list_available" > "configs/white-list_available(top100)"
          fi
          rm -f .before-docker-run
          echo "Output files:"
          echo "configs/white-list_available passed validation with $COUNT configs"
          ls -la configs/white-list_available "configs/white-list_available(top100)"

      - name: Commit and push configs/white-list_available and configs/white-list_available(top100)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p configs
          if [ -f "configs/white-list_available" ]; then git add configs/white-list_available; fi
          if [ -f "configs/white-list_available(top100)" ]; then git add "configs/white-list_available(top100)"; fi
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          C=$(awk 'NF { count++ } END { print count + 0 }' "configs/white-list_available" 2>/dev/null || echo "0")
          C100=$(awk 'NF { count++ } END { print count + 0 }' "configs/white-list_available(top100)" 2>/dev/null || echo "0")
          OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
          echo "$OLD" | jq -c --arg t "$NOW" --argjson c "$C" --argjson c100 "$C100" '.["configs/white-list_available"] = {updated: $t, count: $c} | .["configs/white-list_available(top100)"] = {updated: $t, count: $c100}' > configs/last-updated.json
          git add configs/last-updated.json
          if ! git diff --cached --quiet; then
            git commit -m "update configs/white-list_available and top100 [Docker, automated]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          else
            echo "configs/white-list_available and top100 unchanged, skip push"
          fi
