# Ежедневная проверка VLESS-ключей и публикация available.txt

name: Daily VLESS check

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:
    # Ручной запуск из вкладки Actions

concurrency:
  group: daily-vless-check
  cancel-in-progress: true

env:
  MODE: merge
  LINKS_FILE: links.txt
  OUTPUT_FILE: available.txt
  OUTPUT_ADD_DATE: 'false'
  MAX_WORKERS: 200
  EXPORT_FORMAT: txt
  ENABLE_CACHE: 'false'

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create links.txt from secret
        run: |
          if [ -z "$LINKS_FILE_CONTENT" ]; then
            echo "::error::Secret LINKS_FILE_CONTENT is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$LINKS_FILE_CONTENT" > links.txt
        env:
          LINKS_FILE_CONTENT: ${{ secrets.LINKS_FILE_CONTENT }}

      - name: Run vless_checker.py
        run: python vless_checker.py

      - name: Commit and push available.txt and available(top100).txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=
          if [ -n "$(git status --porcelain available.txt)" ]; then
            git add available.txt
            CHANGED=1
          fi
          if [ -f "available(top100).txt" ] && [ -n "$(git status --porcelain 'available(top100).txt')" ]; then
            git add "available(top100).txt"
            CHANGED=1
          fi
          if [ -n "$CHANGED" ]; then
            git commit -m "chore: update available.txt and top100 [automated]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          else
            echo "available.txt and top100 unchanged, skip push"
          fi
